name: Bug report
description: Report a reproducible defect in Agentic.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, credentials, private data, or vulnerability details. Use the private security reporting link for security issues.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands, routes, or UI actions.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, persistence mode, browser, and relevant package versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove tokens, cookies, credentials, workspace data, and personal data before posting.
