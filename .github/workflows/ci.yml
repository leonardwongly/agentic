name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  # GitHub is deprecating the Node 20 Actions runtime; opt into the Node 24
  # path now so warning-only transitions do not become surprise CI failures later.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NEXT_TELEMETRY_DISABLED: "1"

permissions:
  contents: read

jobs:
  provenance-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate GitHub Actions provenance pins
        run: npm run ci:validate-provenance

  dependency-review:
    # Dependency review only works on public repositories and supported GHAS-backed
    # private repos. Skip unsupported private repos by default, with an explicit
    # opt-in knob for environments that enable the necessary GitHub features.
    if: github.event_name == 'pull_request' && (!github.event.repository.private || vars.ENABLE_DEPENDENCY_REVIEW == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  validate:
    needs: provenance-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/agentic
      AGENTIC_ACCESS_KEY: ci-access-key
      NODE_ENV: test
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - run: npm ci

      - name: Create security artifact directories
        run: mkdir -p artifacts/security artifacts/build artifacts/compliance

      - name: Validate compliance registry references
        run: npm run compliance:validate-registry

      - name: Audit production dependencies
        run: npm run security:audit-runtime -- --minimum-severity moderate --report artifacts/security/runtime-audit-report.json

      - name: Validate migrations
        run: |
          npm run db:check-migrations
          npm run db:migrate
          npm run db:status -- --require-ready

      - name: Run governance simulation suite
        run: npm run governance:simulate

      - name: Run security regression suite
        run: npm run test:security:regression

      - name: Run unit and integration tests
        run: npm test

      - name: Validate feature capability contracts
        run: npm run test:smoke:capabilities

      - name: Validate architecture fitness
        run: npm run test:architecture:fitness

      - name: Validate parallel worktree ownership
        if: startsWith(github.head_ref, 'feat/parallel-') || startsWith(github.ref_name, 'feat/parallel-')
        run: npm run test:parallel-worktree:fitness

      - name: Validate performance fitness
        run: npm run test:performance:fitness

      - name: Run async execution smoke
        run: npm run test:smoke:observability

      - name: Build applications
        run: npm run build

      - name: Generate runtime SBOM
        run: npm run security:sbom -- --output artifacts/security/agentic-sbom.spdx.json

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: npm run test:e2e

      - name: Build container image
        run: docker build --build-arg NODE_OPTIONS="$NODE_OPTIONS" -t agentic-ci:${{ github.sha }} .

      - name: Package deployable build artifacts
        run: |
          tar -czf artifacts/build/agentic-runtime-bundle.tgz \
            apps/web/.next \
            apps/web/package.json \
            apps/worker/package.json \
            package.json \
            package-lock.json \
            packages \
            scripts
          docker save agentic-ci:${{ github.sha }} -o artifacts/build/agentic-image.tar

      - name: Collect compliance evidence bundle
        run: npm run security:collect-evidence -- --require-artifacts --output-dir artifacts/compliance

      - name: Upload supply-chain evidence
        if: github.event_name != 'pull_request' && vars.ENABLE_SUPPLY_CHAIN_ARTIFACT_UPLOAD == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: agentic-supply-chain-evidence
          path: |
            artifacts/security
            artifacts/build
            artifacts/compliance
          if-no-files-found: error
          retention-days: 7

      - name: Note pull request evidence upload skip
        if: github.event_name == 'pull_request'
        run: |
          echo "Generated supply-chain evidence locally for PR validation."
          echo "Skipping artifact upload on pull_request events to avoid quota-bound CI failures."

  attest-supply-chain:
    needs: validate
    if: github.event_name != 'pull_request' && vars.ENABLE_SUPPLY_CHAIN_ARTIFACT_UPLOAD == 'true' && (!github.event.repository.private || github.event.repository.owner.type == 'Organization' || vars.ENABLE_ATTESTATIONS == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      attestations: write
      id-token: write
    steps:
      - name: Download supply-chain evidence
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: agentic-supply-chain-evidence
          path: artifacts

      - name: Attest security evidence
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: artifacts/security/agentic-sbom.spdx.json

      - name: Attest deployable build artifacts
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            artifacts/build/agentic-runtime-bundle.tgz
            artifacts/build/agentic-image.tar
