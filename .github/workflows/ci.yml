name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/agentic
      AGENTIC_ACCESS_KEY: ci-access-key
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Validate migrations
        run: |
          npm run db:migrate
          npm run db:status -- --require-ready

      - name: Run unit and integration tests
        run: npm test

      - name: Validate feature capability contracts
        run: npm run test:smoke:capabilities

      - name: Validate architecture fitness
        run: npm run test:architecture:fitness

      - name: Validate performance fitness
        run: npm run test:performance:fitness

      - name: Run async execution smoke
        run: npm run test:smoke:observability

      - name: Build applications
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: npm run test:e2e

      - name: Build container image
        run: docker build -t agentic-ci:${{ github.sha }} .
