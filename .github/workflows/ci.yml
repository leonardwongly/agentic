name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  actions: read
  attestations: write
  id-token: write

jobs:
  dependency-review:
    # Dependency review only works on public repositories and supported GHAS-backed
    # private repos. Keep runtime dependency auditing as the default required gate
    # and allow explicitly enabled repositories to opt back into dependency review.
    if: github.event_name == 'pull_request' && (!github.event.repository.private || vars.ENABLE_DEPENDENCY_REVIEW == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/agentic
      AGENTIC_ACCESS_KEY: ci-access-key
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create security artifact directories
        run: mkdir -p artifacts/security artifacts/build artifacts/compliance

      - name: Audit production dependencies
        run: npm run security:audit-runtime -- --report artifacts/security/runtime-audit-report.json

      - name: Validate migrations
        run: |
          npm run db:migrate
          npm run db:status -- --require-ready

      - name: Run security regression suite
        run: npm run test:security:regression

      - name: Install document pipeline dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Run unit and integration tests
        env:
          DATABASE_URL: ""
        run: npm test

      - name: Validate feature capability contracts
        run: npm run test:smoke:capabilities

      - name: Validate architecture fitness
        run: npm run test:architecture:fitness

      - name: Validate performance fitness
        run: npm run test:performance:fitness

      - name: Run async execution smoke
        run: npm run test:smoke:observability

      - name: Build applications
        run: npm run build

      - name: Generate runtime SBOM
        run: npm run security:sbom -- --output artifacts/security/agentic-sbom.spdx.json

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: npm run test:e2e

      - name: Build container image
        run: docker build -t agentic-ci:${{ github.sha }} .

      - name: Package deployable build artifacts
        run: |
          tar -czf artifacts/build/agentic-runtime-bundle.tgz \
            apps/web/.next \
            apps/web/package.json \
            apps/worker/package.json \
            package.json \
            package-lock.json \
            packages \
            scripts
          docker save agentic-ci:${{ github.sha }} -o artifacts/build/agentic-image.tar

      - name: Collect compliance evidence bundle
        run: npm run security:collect-evidence -- --require-artifacts --output-dir artifacts/compliance

      - name: Upload supply-chain evidence
        uses: actions/upload-artifact@v4
        with:
          name: agentic-supply-chain-evidence
          path: |
            artifacts/security
            artifacts/build
            artifacts/compliance
          if-no-files-found: error

      - name: Attest security evidence
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/security/agentic-sbom.spdx.json

      - name: Attest deployable build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/build/agentic-runtime-bundle.tgz
            artifacts/build/agentic-image.tar
