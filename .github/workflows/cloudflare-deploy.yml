name: Cloudflare Deploy

# Manual deploy of the Next.js app to Cloudflare Workers via @opennextjs/cloudflare
# (F6 / #983). Skips cleanly unless Cloudflare credentials are configured, so forks
# and the upstream repo are unaffected.
#
# Required repository secrets:
#   secrets.CLOUDFLARE_API_TOKEN   - token with Workers Scripts edit permission
#   secrets.CLOUDFLARE_ACCOUNT_ID  - target Cloudflare account id
# Optional:
#   secrets.AGENTIC_DATABASE_URL   - when set, migrations are applied before deploy;
#                                    otherwise apply them out-of-band first.
#
# Runtime secrets (AGENTIC_ACCESS_KEY, machine tokens, provider keys) and the
# Hyperdrive binding are configured as Wrangler secrets/bindings out-of-band, not
# in CI. See docs/deployment/cloudflare-workers.md.
#
# The Cloudflare build uses Webpack (deduped chunks) and is ~2.4 MiB gzipped, under
# the Workers limit; the "Check worker bundle size" step enforces it.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to Cloudflare Workers
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AGENTIC_DATABASE_URL: ${{ secrets.AGENTIC_DATABASE_URL }}
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Check Cloudflare configuration
        id: guard
        shell: bash
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::notice title=Cloudflare deploy not configured::Set secrets.CLOUDFLARE_API_TOKEN and secrets.CLOUDFLARE_ACCOUNT_ID to enable this workflow."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: steps.guard.outputs.configured == 'true'
        with:
          fetch-depth: 1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.guard.outputs.configured == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.configured == 'true'
        run: npm ci

      - name: Apply database migrations
        if: steps.guard.outputs.configured == 'true' && env.AGENTIC_DATABASE_URL != ''
        env:
          DATABASE_URL: ${{ secrets.AGENTIC_DATABASE_URL }}
        run: |
          npm run db:migrate
          npm run db:status -- --require-ready

      - name: Build the Cloudflare worker
        if: steps.guard.outputs.configured == 'true'
        run: npm run cf:build -w @agentic/web

      - name: Check worker bundle size
        if: steps.guard.outputs.configured == 'true'
        run: npm run cf:check-size

      - name: Deploy to Cloudflare Workers
        if: steps.guard.outputs.configured == 'true'
        working-directory: apps/web
        env:
          DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          if [ "$DEPLOY_ENVIRONMENT" = "production" ]; then
            ../../node_modules/.bin/wrangler deploy
          else
            ../../node_modules/.bin/wrangler versions upload
          fi
