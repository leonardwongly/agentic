name: Staging Deploy

run-name: Staging deploy from ${{ github.ref_name }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  attestations: write
  id-token: write

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  manual-trigger-guard:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Staging deploy is manual-only. No deployment executed for event '${{ github.event_name }}'."

  stage:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      AGENTIC_ACCESS_KEY: ${{ secrets.STAGING_AGENTIC_ACCESS_KEY }}
      AGENTIC_REQUIRE_SHARED_AUTH_STATE: "true"
      AGENTIC_SMOKE_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      AGENTIC_SMOKE_ACCESS_KEY: ${{ secrets.STAGING_SMOKE_ACCESS_KEY }}
      AGENTIC_STAGING_DEPLOY_BIN: ${{ vars.STAGING_DEPLOY_BIN }}
      AGENTIC_STAGING_DEPLOY_ARGS_JSON: ${{ secrets.STAGING_DEPLOY_ARGS_JSON }}
      AGENTIC_STAGING_DEPLOY_TIMEOUT_MS: ${{ vars.STAGING_DEPLOY_TIMEOUT_MS }}
      AGENTIC_STAGING_IMAGE_TAG: agentic-staging:${{ github.sha }}
      AGENTIC_TELEMETRY_EXPORT_URL: ${{ secrets.STAGING_TELEMETRY_EXPORT_URL }}
      AGENTIC_TELEMETRY_EXPORT_TOKEN: ${{ secrets.STAGING_TELEMETRY_EXPORT_TOKEN }}
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Validate required staging configuration
        id: inspect
        shell: bash
        run: |
          missing=()
          test -n "$DATABASE_URL" || missing+=("STAGING_DATABASE_URL")
          test -n "$AGENTIC_ACCESS_KEY" || missing+=("STAGING_AGENTIC_ACCESS_KEY")
          test -n "$AGENTIC_SMOKE_BASE_URL" || missing+=("STAGING_BASE_URL")
          test -n "$AGENTIC_SMOKE_ACCESS_KEY" || missing+=("STAGING_SMOKE_ACCESS_KEY")
          test -n "$AGENTIC_STAGING_DEPLOY_BIN" || missing+=("STAGING_DEPLOY_BIN")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf 'missing=%s\n' "$(IFS=,; echo "${missing[*]}")" >> "$GITHUB_OUTPUT"
            echo "Missing staging configuration: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "missing=" >> "$GITHUB_OUTPUT"
          echo "Staging configuration is present."

      - name: Initialize staging runtime environment
        if: steps.inspect.outputs.ready == 'true'
        run: echo "AGENTIC_TELEMETRY_RETENTION_DIR=${RUNNER_TEMP}/agentic-telemetry" >> "$GITHUB_ENV"

      - if: steps.inspect.outputs.ready == 'true'
        run: npm ci

      - name: Create security artifact directories
        if: steps.inspect.outputs.ready == 'true'
        run: mkdir -p artifacts/security artifacts/build

      - name: Audit production dependencies
        if: steps.inspect.outputs.ready == 'true'
        run: npm run security:audit-runtime -- --report artifacts/security/runtime-audit-report.json

      - name: Build deployable artifacts
        if: steps.inspect.outputs.ready == 'true'
        run: npm run build

      - name: Generate runtime SBOM
        if: steps.inspect.outputs.ready == 'true'
        run: npm run security:sbom -- --output artifacts/security/agentic-sbom.spdx.json

      - name: Validate staging database readiness
        if: steps.inspect.outputs.ready == 'true'
        run: npm run db:status -- --require-ready

      - name: Validate feature capability contracts
        if: steps.inspect.outputs.ready == 'true'
        run: npm run test:smoke:capabilities

      - name: Validate async execution smoke path
        if: steps.inspect.outputs.ready == 'true'
        run: npm run test:smoke:observability

      - name: Validate telemetry exporter and retention wiring
        if: steps.inspect.outputs.ready == 'true'
        run: npm run test:smoke:observability-export

      - name: Validate rollout gate manifests against retained telemetry
        if: steps.inspect.outputs.ready == 'true'
        run: npm run telemetry:rollout-gate -- --dir "$AGENTIC_TELEMETRY_RETENTION_DIR"

      - name: Build staging image
        if: steps.inspect.outputs.ready == 'true'
        run: docker build --build-arg NODE_OPTIONS="$NODE_OPTIONS" -t "$AGENTIC_STAGING_IMAGE_TAG" .

      - name: Package staging build artifacts
        if: steps.inspect.outputs.ready == 'true'
        run: |
          tar -czf artifacts/build/agentic-runtime-bundle.tgz \
            apps/web/.next \
            apps/web/package.json \
            apps/worker/package.json \
            package.json \
            package-lock.json \
            packages \
            scripts
          docker save "$AGENTIC_STAGING_IMAGE_TAG" -o artifacts/build/agentic-image.tar

      - name: Run provider staging deploy
        if: steps.inspect.outputs.ready == 'true'
        run: npm run deploy:staging:provider

      - name: Smoke-check deployed staging environment
        if: steps.inspect.outputs.ready == 'true'
        run: npm run test:smoke:deployment

      - name: Validate deployed async execution canary
        if: steps.inspect.outputs.ready == 'true'
        run: npm run test:smoke:deployment-async

      - name: Upload telemetry rollout evidence
        if: always() && steps.inspect.outputs.ready == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: agentic-staging-telemetry
          path: ${{ env.AGENTIC_TELEMETRY_RETENTION_DIR }}
          if-no-files-found: warn

      - name: Upload staging supply-chain evidence
        if: always() && steps.inspect.outputs.ready == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: agentic-staging-supply-chain
          path: |
            artifacts/security
            artifacts/build
          if-no-files-found: error

      - name: Attest staging security evidence
        if: steps.inspect.outputs.ready == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/security/agentic-sbom.spdx.json

      - name: Attest staging deployable build artifacts
        if: steps.inspect.outputs.ready == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/build/agentic-runtime-bundle.tgz
            artifacts/build/agentic-image.tar

      - name: Skip staging deploy when configuration is absent
        if: steps.inspect.outputs.ready != 'true'
        run: |
          echo "Skipping staging deploy because required repository configuration is missing: ${{ steps.inspect.outputs.missing }}"
