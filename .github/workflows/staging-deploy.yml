name: Staging Deploy

on:
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  stage:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      AGENTIC_ACCESS_KEY: ${{ secrets.STAGING_AGENTIC_ACCESS_KEY }}
      AGENTIC_REQUIRE_SHARED_AUTH_STATE: "true"
      AGENTIC_SMOKE_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      AGENTIC_SMOKE_ACCESS_KEY: ${{ secrets.STAGING_SMOKE_ACCESS_KEY }}
      AGENTIC_STAGING_DEPLOY_BIN: ${{ vars.STAGING_DEPLOY_BIN }}
      AGENTIC_STAGING_DEPLOY_ARGS_JSON: ${{ secrets.STAGING_DEPLOY_ARGS_JSON }}
      AGENTIC_STAGING_DEPLOY_TIMEOUT_MS: ${{ vars.STAGING_DEPLOY_TIMEOUT_MS }}
      AGENTIC_STAGING_IMAGE_TAG: agentic-staging:${{ github.sha }}
      AGENTIC_TELEMETRY_RETENTION_DIR: ${{ runner.temp }}/agentic-telemetry
      AGENTIC_TELEMETRY_EXPORT_URL: ${{ secrets.STAGING_TELEMETRY_EXPORT_URL }}
      AGENTIC_TELEMETRY_EXPORT_TOKEN: ${{ secrets.STAGING_TELEMETRY_EXPORT_TOKEN }}
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required staging configuration
        run: |
          test -n "$DATABASE_URL" || { echo "Missing STAGING_DATABASE_URL"; exit 1; }
          test -n "$AGENTIC_ACCESS_KEY" || { echo "Missing STAGING_AGENTIC_ACCESS_KEY"; exit 1; }
          test -n "$AGENTIC_SMOKE_BASE_URL" || { echo "Missing STAGING_BASE_URL"; exit 1; }
          test -n "$AGENTIC_SMOKE_ACCESS_KEY" || { echo "Missing STAGING_SMOKE_ACCESS_KEY"; exit 1; }
          test -n "$AGENTIC_STAGING_DEPLOY_BIN" || { echo "Missing STAGING_DEPLOY_BIN"; exit 1; }

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build deployable artifacts
        run: npm run build

      - name: Validate staging database readiness
        run: npm run db:status -- --require-ready

      - name: Validate feature capability contracts
        run: npm run test:smoke:capabilities

      - name: Validate async execution smoke path
        run: npm run test:smoke:observability

      - name: Validate telemetry exporter and retention wiring
        run: npm run test:smoke:observability-export

      - name: Validate rollout gate manifests against retained telemetry
        run: npm run telemetry:rollout-gate -- --dir "$AGENTIC_TELEMETRY_RETENTION_DIR"

      - name: Build staging image
        run: docker build -t "$AGENTIC_STAGING_IMAGE_TAG" .

      - name: Run provider staging deploy
        run: npm run deploy:staging:provider

      - name: Smoke-check deployed staging environment
        run: npm run test:smoke:deployment

      - name: Validate deployed async execution canary
        run: npm run test:smoke:deployment-async

      - name: Upload telemetry rollout evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-staging-telemetry
          path: ${{ env.AGENTIC_TELEMETRY_RETENTION_DIR }}
          if-no-files-found: warn
